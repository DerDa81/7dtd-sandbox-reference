<!DOCTYPE html>
<html lang="de" data-lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Days to Die V3 Sandbox Settings Guide</title>
<meta name="description" content="Complete documentation of all 150 Sandbox Settings from 7 Days to Die Version 3. DE/EN reference for players and server admins.">
<meta name="theme-color" content="#0f0f12">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h1>7DTD <span class="v">V3.0</span></h1>
      <p class="sidebar-sub">Sandbox-Referenz</p>
    </div>
    <nav id="category-nav" class="category-nav"></nav>
    <div class="sidebar-footer">
      <button id="expand-all" class="btn-sm">Alle aufklappen</button>
      <button id="collapse-all" class="btn-sm">Alle einklappen</button>
    </div>
  </aside>

  <!-- Overlay für mobiles Sidebar -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menü">☰</button>

  <!-- Main -->
  <main id="main" class="main">
    <header class="main-header">
      <div class="header-top">
        <div>
          <h2 id="page-title">Sandbox-Einstellungen</h2>
          <p id="result-count" class="result-count">150 Optionen</p>
        </div>
        <button id="lang-toggle" class="lang-btn" title="Sprache umschalten">DE / EN</button>
      </div>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Suchen..." autocomplete="off">
      </div>
    </header>

    <div id="options-list" class="options-list"></div>
    <p id="empty-state" class="empty-state">Keine Optionen gefunden.</p>
  </main>

  <!-- Back to top -->
  <button id="back-to-top" class="back-to-top" title="Nach oben">↑</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
